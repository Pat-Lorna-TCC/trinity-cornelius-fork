# .trinity-remote.yaml — remote Trinity instances of this agent.
# Shared with /trinity:sync and /trinity:loop. The instance/profile/deployed_at
# fields are maintained by onboard; sync owns branch and any extra remotes.
default: prod

remotes:
  prod:
    agent: cornelius
    branch: main
    instance: http://localhost
    profile: localhost
    deployed_at: "2026-07-07T16:38:47Z"
    description: Deployed via /trinity:onboard (github:Pat-Lorna-TCC/trinity-cornelius-fork)
